version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: always

  client:
    build:
      context: ./client/client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: always
